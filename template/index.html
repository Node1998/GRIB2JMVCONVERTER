<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIB2 → JMV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-eccodes="{{ 'ready' if eccodes else 'offline' }}">

  <header class="topbar">
    <div class="mark">
      <span class="mark-grib">GRIB2</span>
      <span class="mark-arrow">→</span>
      <span class="mark-jmv">JMV</span>
    </div>
    <p class="tagline">FNMOC binary grid conversion</p>
    <div class="status" id="engineStatus">
      <span class="dot"></span><span class="status-text">checking engine…</span>
    </div>
  </header>

  <main class="grid">
    <!-- INTAKE -------------------------------------------------------- -->
    <section class="col col-intake">
      <div class="dropzone" id="dropzone" tabindex="0" role="button"
           aria-label="Drop GRIB2 files here or browse">
        <input type="file" id="fileInput" multiple hidden>
        <div class="dz-glyph" aria-hidden="true">
          <svg viewBox="0 0 48 36" width="46" height="36">
            <path d="M4 10a4 4 0 0 1 4-4h11l4 4h17a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"
                  fill="none" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </div>
        <p class="dz-title">Drop GRIB2 files here</p>
        <p class="dz-sub">or <span class="dz-link">browse the file system</span></p>
        <ul class="filelist" id="filelist" hidden></ul>
      </div>

      <button class="btn btn-primary" id="convertBtn" disabled>
        <span class="btn-label">Batch convert</span>
      </button>

      <div class="panel detected">
        <div class="panel-head">
          <span class="panel-title">Parameters detected</span>
          <span class="param-count" id="paramCount">—</span>
        </div>
        <ul class="param-rows" id="paramRows">
          <li class="param-empty">Drop a file to scan its parameters.</li>
        </ul>
      </div>
    </section>

    <!-- OUTPUT -------------------------------------------------------- -->
    <section class="col col-output">
      <div class="panel viz">
        <div class="panel-head">
          <span class="panel-title">Visualization</span>
          <span class="viz-meta" id="vizMeta"></span>
        </div>
        <div class="viz-stage" id="vizStage">
          <canvas id="vizCanvas" width="640" height="400"></canvas>
          <div class="viz-idle" id="vizIdle">Convert a file to preview a grid.</div>
          <div class="colorbar" id="colorbar" hidden>
            <span class="cb-min">—</span>
            <span class="cb-ramp"></span>
            <span class="cb-max">—</span>
          </div>
        </div>
      </div>

      <div class="chips" id="chips"></div>

      <div class="actions">
        <button class="btn btn-ghost" id="exportBtn" disabled>Export package</button>
        <button class="btn btn-ghost" id="shareBtn" disabled>Share</button>
      </div>
    </section>
  </main>

  <!-- PROGRESS --------------------------------------------------------- -->
  <footer class="progress-strip">
    <span class="prog-label" id="progLabel">Idle — no batch running</span>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
